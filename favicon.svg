<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @media (prefers-color-scheme: light) {
        .fav-bg { fill: #ffffff; stroke: #e6e8eb; }
        .fav-stroke { stroke: #1b1f23; }
        .fav-fill { fill: #1b1f23; }
      }
      @media (prefers-color-scheme: dark) {
        .fav-bg { fill: #0d1117; stroke: #30363d; }
        .fav-stroke { stroke: #e6edf3; }
        .fav-fill { fill: #e6edf3; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="56" height="56" rx="12" class="fav-bg" stroke-width="0.5"/>

  <!-- Concentric circles -->
  <circle cx="32" cy="32" r="22" fill="none" class="fav-stroke" stroke-width="3" opacity="0.45"/>
  <circle cx="32" cy="32" r="12" fill="none" class="fav-stroke" stroke-width="3" opacity="0.55"/>

  <!-- Center point -->
  <circle cx="32" cy="32" r="4" class="fav-fill"/>

  <!-- Cardinal points -->
  <circle cx="32" cy="10" r="3.5" class="fav-fill" opacity="0.75"/>
  <circle cx="54" cy="32" r="3.5" class="fav-fill" opacity="0.75"/>
  <circle cx="32" cy="54" r="3.5" class="fav-fill" opacity="0.75"/>
  <circle cx="10" cy="32" r="3.5" class="fav-fill" opacity="0.75"/>
</svg>
